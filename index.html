<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VHS Effect</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: white;
  font-family: monospace;
}

/* Content */
.screen {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
}

/* TEXT */
.screen h1 {
  z-index: 1;
}

/* VHS scanlines */
.screen::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;

  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.15) 0px,
    rgba(255,255,255,0.15) 2px,
    transparent 2px,
    transparent 4px
  );

  animation: moveLines 0.2s linear infinite;
  pointer-events: none;
}

/* movement */
@keyframes moveLines {
  0% { transform: translateY(0); }
  100% { transform: translateY(4px); }
}

/* flicker */
.screen {
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.9; }
}
</style>
</head>

<body>
<div class="screen">
  <h1>VHS MODE</h1>
</div>
</body>
</html>
