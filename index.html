<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VHS Lines Only</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* FULLSCREEN VHS LINES */
.vhs-lines {
  position: fixed;
  top: -100%;
  left: 0;
  width: 100vw;
  height: 300vh;

  background-image: url("https://i.imgur.com/8KrmQ4P.png"); /* scanlines PNG */
  background-repeat: repeat;

  opacity: 0.4;

  animation: move 0.1s linear infinite;
}

@keyframes move {
  0% { transform: translateY(0); }
  100% { transform: translateY(100px); }
}
</style>
</head>

<body>

<div class="vhs-lines"></div>

</body>
</html>
